    <div>
        <h1>Підтримка</h1>
    </div>

    <div>
        <form>
            <fieldset>
                <legend>Розкажіть про себе</legend>
                    <div>
                        <label for="name">Ім'я</label>
                        <input id="name" type="text" name="name">
                    </div>
                    <div>
                        <label for="family-name">Прізвище</label>
                        <input id="family-name" type="text" name="family-name">
                    </div>
                    <div>
                        <label for="age">Вік</label>
                        <input id="age" type="date" name="age">
                    </div>
            </fieldset>

            <fieldset>
                <legend>Ваші контакти</legend>
                    <div>
                        <label for="tel">Контактний телефон</label>
                        <input id="tel" type="tel" name="tel">
                    </div>
                    <div>
                        <label for="email">Електронна пошта</label>
                        <input id="email" type="email" name="email">
                    </div>
            </fieldset>

            <fieldset>
                <legend>Ваше звернення</legend>
                    <div>
                        <label for="type1">Тип звернення 1</label>
                        <input id="type1" type="radio" name="type">
                    </div>
                    <div>
                        <label for="type2">Тип звернення 2</label>
                        <input id="type2" type="radio" name="type">
                    </div>
                    <div>
                        <label for="type3">Тип звернення 3</label>
                        <input id="type3" type="radio" name="type">
                    </div>
                    <div>
                        <label for="issue">Опис проблеми</label>
                        <textarea id="issue" name="issue" cols="100" rows="7"></textarea>
                    </div>
            </fieldset>
            <br>
            <button type="reset">Очистити</button>
            <button type="submit">Надіслати</button>
        </form>
    </div>

    <!-- Футер -->

    <hr>
