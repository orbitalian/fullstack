<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Валідація</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f5;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .card-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 12px 44px 12px 14px;
      font-size: 14px;
      color: #f0f0f5;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: #3d4252; }

    input:focus { border-color: #4f6ef7; }
    input.valid   { border-color: #22c55e; }
    input.invalid { border-color: #ef4444; }

    .icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    input.valid   ~ .icon.ok  { opacity: 1; }
    input.invalid ~ .icon.err { opacity: 1; }

    .hint {
      font-size: 12px;
      margin-top: 5px;
      min-height: 16px;
      color: #6b7280;
      transition: color 0.2s;
    }

    .hint.valid   { color: #22c55e; }
    .hint.invalid { color: #ef4444; }

    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 0.5rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn:hover  { background: #3b5bdb; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #2a2d3a; color: #4b5563; cursor: not-allowed; }

    .result {
      margin-top: 1.25rem;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .result.success {
      display: block;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #4ade80;
    }

    .result.error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-title">Перевірка даних</div>
    <div class="card-subtitle">Введіть email та URL для валідації</div>

    <div class="field">
      <label for="email">Email адреса</label>
      <div class="input-wrap">
        <input type="text" id="email" placeholder="example@domain.com" autocomplete="off" />
        <span class="icon ok">✅</span>
        <span class="icon err">❌</span>
      </div>
      <div class="hint" id="email-hint"></div>
    </div>

    <div class="field">
      <label for="url">URL сайту</label>
      <div class="input-wrap">
        <input type="text" id="url" placeholder="https://www.example.com" autocomplete="off" />
        <span class="icon ok">✅</span>
        <span class="icon err">❌</span>
      </div>
      <div class="hint" id="url-hint"></div>
    </div>

    <button class="btn" id="submit-btn" disabled>Перевірити</button>

    <div class="result" id="result"></div>
  </div>

  <script type="module">
    import { isValidEmail, isValidUrl } from './main.js';

    const emailInput = document.getElementById('email');
    const urlInput   = document.getElementById('url');
    const emailHint  = document.getElementById('email-hint');
    const urlHint    = document.getElementById('url-hint');
    const submitBtn  = document.getElementById('submit-btn');
    const result     = document.getElementById('result');

    function validate(input, hint, fn, okMsg, errMsg) {
      const val = input.value.trim();
      if (!val) {
        input.className = '';
        hint.className = 'hint';
        hint.textContent = '';
        return false;
      }
      const ok = fn(val);
      input.className = ok ? 'valid' : 'invalid';
      hint.className  = 'hint ' + (ok ? 'valid' : 'invalid');
      hint.textContent = ok ? okMsg : errMsg;
      return ok;
    }

    function checkBtn() {
      const emailOk = isValidEmail(emailInput.value.trim());
      const urlOk   = isValidUrl(urlInput.value.trim());
      submitBtn.disabled = !(emailOk && urlOk);
    }

    emailInput.addEventListener('input', () => {
      validate(emailInput, emailHint, isValidEmail, 'Email валідний', 'Невірний формат email');
      checkBtn();
      result.className = 'result';
    });

    urlInput.addEventListener('input', () => {
      validate(urlInput, urlHint, isValidUrl, 'URL валідний', 'Невірний формат URL');
      checkBtn();
      result.className = 'result';
    });

    submitBtn.addEventListener('click', () => {
      result.className = 'result success';
      result.textContent = `✓ Дані валідні! Email: ${emailInput.value.trim()} · URL: ${urlInput.value.trim()}`;
    });
  </script>

</body>
</html>
