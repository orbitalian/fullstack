<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slider — Класи</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="slider-wrap" id="slider-class">
    <div class="slider-viewport">
      <div class="slider-track">
        <div class="slide">
          <img src="https://picsum.photos/seed/slide1/1200/600" alt="Перший слайд" />
          <div class="slide-content">
            <span class="slide-num">01</span>
            <span class="slide-label">Перший слайд</span>
          </div>
        </div>
        <div class="slide">
          <img src="https://picsum.photos/seed/slide2/1200/600" alt="Другий слайд" />
          <div class="slide-content">
            <span class="slide-num">02</span>
            <span class="slide-label">Другий слайд</span>
          </div>
        </div>
        <div class="slide">
          <img src="https://picsum.photos/seed/slide3/1200/600" alt="Третій слайд" />
          <div class="slide-content">
            <span class="slide-num">03</span>
            <span class="slide-label">Третій слайд</span>
          </div>
        </div>
        <div class="slide">
          <img src="https://picsum.photos/seed/slide4/1200/600" alt="Четвертий слайд" />
          <div class="slide-content">
            <span class="slide-num">04</span>
            <span class="slide-label">Четвертий слайд</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="slider-class.js"></script>
</body>
</html>
