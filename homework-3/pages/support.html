<!DOCTYPE html>
<html lang="zxx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Document</title>
</head>
<body>
    <div class="main-menu">
        <div class="container">
            <ul class="main-menu-list">
                <li class="menu-item"><a href="../index.html">Головна</a></li>
                <li class="menu-item"><a href="./articles.html">Статті</a></li>
                <li class="menu-item"><a href="./list.html">Каталог</a></li>
                <li class="menu-item"><a href="./gallery.html">Галерея</a></li>
                <li class="menu-item"><a href="./support.html">Підтримка</a></li>
                <li class="menu-item"><a href="./contacts.html">Контакти</a></li>
            </ul>
        </div>
    </div>

    <div class="main">
        <div class="container">
            <div>
                <h1>Підтримка</h1>
            </div>

            <div>
                <form>
                    <fieldset>
                        <legend>Розкажіть про себе</legend>
                            <div>
                                <label for="name">Ім'я</label>
                                <input id="name" type="text" name="name">
                            </div>
                            <div>
                                <label for="family-name">Прізвище</label>
                                <input id="family-name" type="text" name="family-name">
                            </div>
                            <div>
                                <label for="age">Вік</label>
                                <input id="age" type="date" name="age">
                            </div>
                    </fieldset>

                    <fieldset>
                        <legend>Ваші контакти</legend>
                            <div>
                                <label for="tel">Контактний телефон</label>
                                <input id="tel" type="tel" name="tel">
                            </div>
                            <div>
                                <label for="email">Електронна пошта</label>
                                <input id="email" type="email" name="email">
                            </div>
                    </fieldset>

                    <fieldset>
                        <legend>Ваше звернення</legend>
                            <div>
                                <label for="type1">Тип звернення 1</label>
                                <input id="type1" type="radio" name="type">
                            </div>
                            <div>
                                <label for="type2">Тип звернення 2</label>
                                <input id="type2" type="radio" name="type">
                            </div>
                            <div>
                                <label for="type3">Тип звернення 3</label>
                                <input id="type3" type="radio" name="type">
                            </div>
                            <div>
                                <label for="issue">Опис проблеми</label>
                                <textarea id="issue" name="issue" cols="100" rows="7"></textarea>
                            </div>
                    </fieldset>
                    <br>
                    <button type="reset">Очистити</button>
                    <button type="submit">Надіслати</button>
                </form>
            </div>
        </div>
        <hr>
    </div>

    <!-- Футер -->
    <div class="footer">
        <div class="container">
            <p class="footer-text">&copy;&nbsp;2026&nbsp;Всі права захищені</p>
        </div>
    </div>

</body>
</html>
